name: Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - Cargo.toml
      - docs/**
      - docs/package.json

permissions:
  contents: read

jobs:
  init:
    name: Init
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install semantic-release and plugins
        run: npm install -g semantic-release @semantic-release/github @semantic-release/git @semantic-release/changelog
      - name: Get next version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "NEXT_VERSION=$(semantic-release --dry-run | grep "Release note for version" |sed -n 's/.*Release note for version \([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')" >> $GITHUB_ENV
      - name: Update Cargo.toml
        run: |
          sed -i'' -e "s/^version = .*/version = \"${{ env.NEXT_VERSION }}\"/" Cargo.toml
      - name: Update package.json
        run: |
          sed -i'' -e "s/\"version\": \".*\"/\"version\": \"${{ env.NEXT_VERSION }}\"/" package.json
        working-directory: docs
      - uses: actions/upload-artifact@v4
        with:
          name: cargo_toml
          path: Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: package_json
          path: docs/package.json

  build:
    name: Build
    needs: init
    strategy:
      matrix:
        platform:
          - runs-on: macos-latest
            target: x86_64-apple-darwin
          - runs-on: macos-latest
            target: aarch64-apple-darwin
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: cargo_toml
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--release"
          strip: true
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: snapctl-${{ matrix.platform.target }}
          path: |
            target/${{ matrix.platform.target }}/release/snapctl
            target/${{ matrix.platform.target }}/release/snapctl.exe

  docs:
    name: Docs
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: package_json
          path: docs/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Docusaurus dependencies
        run: npm install
        working-directory: docs
      - name: Build Docusaurus site
        run: npm run build
        working-directory: docs
      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build, docs]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install semantic-release and plugins
        run: npm install -g semantic-release @semantic-release/github @semantic-release/git @semantic-release/changelog
      - uses: actions/download-artifact@v4
        with:
          name: cargo_toml
      - uses: actions/download-artifact@v4
        with:
          name: package_json
          path: docs/
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
          pattern: snapctl-*
          merge-multiple: false
      - name: Rename binaries
        run: |
          for file in builds/*-*; do
            if [[ -f "$file/snapctl" ]]; then
              mv "$file/snapctl" "$file/$(basename "$file")"
            elif [[ -f "$file/snapctl.exe" ]]; then
              mv "$file/snapctl.exe" "$file/$(basename "$file").exe"
            fi
          done
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release